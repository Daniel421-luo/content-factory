name: ✍️ 每周内容改写

permissions:
  contents: write

on:
  schedule:
    - cron: '0 2 * * 6'   # UTC 02:00 周六 = 北京时间 10:00 周六
  workflow_dispatch:

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 批量读本周提炼 → 选精华 → 改写多渠道
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python .github/scripts/weekly-rewrite.py

      - name: Git 提交
        run: |
          git config user.name "改写机器人"
          git config user.email "bot@content-factory.local"
          git add 内容发布/
          git diff --staged --quiet || git commit -m "✍️ 每周改写 $(TZ='Asia/Shanghai' date +%Y-W%U)"
          git push
