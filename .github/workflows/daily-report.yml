name: 📰 日报自动生成

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 00:00 = 北京时间 08:00 AI日报
    - cron: '0 12 * * *'   # UTC 12:00 = 北京时间 20:00 财经日报
  workflow_dispatch:        # 手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests markdownify

      - name: 判断时段（早间=AI日报，晚间=财经日报）
        id: slot
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR" -lt 12 ]; then
            echo "type=ai" >> $GITHUB_OUTPUT
            echo "source=https://aihot.virxact.com/" >> $GITHUB_OUTPUT
          else
            echo "type=finance" >> $GITHUB_OUTPUT
            echo "source=https://www.cls.cn/telegraph" >> $GITHUB_OUTPUT
          fi

      - name: 采集 & DeepSeek炼油 & 存储
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_TYPE: ${{ steps.slot.outputs.type }}
          SOURCE_URL: ${{ steps.slot.outputs.source }}
        run: python .github/scripts/daily-report.py

      - name: Git 提交
        run: |
          git config user.name "AI日报机器人"
          git config user.email "bot@content-factory.local"
          mkdir -p 日报/
          git add 日报/ 抖音素材库/00-索引.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 自动日报 $(TZ='Asia/Shanghai' date +%Y-%m-%d) [${{ steps.slot.outputs.type }}]"
          git push
