name: 📰 三报自动生成

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 00:00 → 北京 08:00 → 🤖 AI Daily (TechCrunch+MIT+VentureBeat+Wired+Ars+ZDNet+Verge)
    - cron: '0 8 * * *'    # UTC 08:00 → 北京 16:00 → 📈 Wall Street Brief (CNBC+MarketWatch+WSJ+BBC)
    - cron: '0 12 * * *'   # UTC 12:00 → 北京 20:00 → 🌍 Global Brief (AP+ABC+BBC+CNN+Guardian+CNBC)
  workflow_dispatch:
    inputs:
      report_type:
        description: '日报类型'
        required: true
        type: choice
        options:
          - ai
          - us_market
          - global

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 判断时段并生成日报
        id: slot
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          if [ "${{ inputs.report_type }}" != "" ]; then
            # 手动触发 — 使用传入的类型
            echo "type=${{ inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -lt 12 ]; then
            echo "type=ai" >> $GITHUB_OUTPUT          # 上午 = AI 日报
          elif [ "$HOUR" -lt 18 ]; then
            echo "type=us_market" >> $GITHUB_OUTPUT    # 下午 = 美股简报
          else
            echo "type=global" >> $GITHUB_OUTPUT       # 晚间 = 全球市场
          fi

      - name: 采集 & DeepSeek炼油 & 存储
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_TYPE: ${{ steps.slot.outputs.type }}
        run: python .github/scripts/daily-report.py

      - name: Git 提交
        run: |
          git config user.name "AI日报机器人"
          git config user.email "bot@content-factory.local"
          mkdir -p 日报/
          git add 日报/ 内容发布/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 自动日报 $(TZ='Asia/Shanghai' date +%Y-%m-%d) [${{ steps.slot.outputs.type }}]"
          git push
