name: 📰 三报自动生成

permissions:
  contents: write

on:
  schedule:
    # 主 cron（3 个时段）+ 冗余 cron（防 GitHub 漏跑）
    - cron: '0 0 * * *'     # UTC 00:00 → 北京 08:00 → 🤖 AI Daily
    - cron: '0 4 * * *'     # UTC 04:00 → 北京 12:00 → 🔄 补报检查（AI 没跑则补）
    - cron: '0 8 * * *'     # UTC 08:00 → 北京 16:00 → 📈 Wall Street Brief（主力）
    - cron: '30 8 * * 1-5'  # UTC 08:30 → 北京 16:30 → 📈 冗余（仅交易日，防 08:00 漏跑）
    - cron: '0 9 * * 1-5'   # UTC 09:00 → 北京 17:00 → 📈 二次冗余
    - cron: '0 12 * * *'    # UTC 12:00 → 北京 20:00 → 🌍 Global Brief + 补报检查
    - cron: '0 13 * * *'    # UTC 13:00 → 北京 21:00 → 🔄 最终补报（兜底）
  workflow_dispatch:
    inputs:
      report_type:
        description: '日报类型'
        required: true
        type: choice
        options:
          - ai
          - us_market
          - global

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 判断时段 + 补报检查
        id: slot
        run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)

          # 检查今天已生成的报告
          AI_EXISTS=$([ -f "日报/AI日报-${TODAY}.md" ] && echo 1 || echo 0)
          US_EXISTS=$([ -f "日报/美股简报-${TODAY}.md" ] && echo 1 || echo 0)
          GLOBAL_EXISTS=$([ -f "日报/全球简报-${TODAY}.md" ] && echo 1 || echo 0)

          echo "📊 已有报告: AI=$AI_EXISTS US=$US_EXISTS GLOBAL=$GLOBAL_EXISTS (北京时间 ${HOUR}:00)"

          if [ "${{ inputs.report_type }}" != "" ]; then
            # 手动触发 — 使用传入的类型
            TYPE="${{ inputs.report_type }}"
          elif [ "$HOUR" -ge 8 ] && [ "$AI_EXISTS" -eq 0 ]; then
            TYPE="ai"                                    # 🔄 补报：AI 8点该跑没跑
          elif [ "$HOUR" -ge 16 ] && [ "$US_EXISTS" -eq 0 ]; then
            TYPE="us_market"                             # 🔄 补报：美股简报 16 点该跑没跑
          elif [ "$HOUR" -ge 20 ] && [ "$GLOBAL_EXISTS" -eq 0 ]; then
            TYPE="global"                                # 🔄 补报：全球简报 20 点该跑没跑
          elif [ "$HOUR" -lt 12 ]; then
            TYPE="ai"
          elif [ "$HOUR" -lt 18 ]; then
            TYPE="us_market"
          else
            TYPE="global"
          fi

          # 如果该类型今天已有报告，跳过
          case "$TYPE" in
            ai)         [ "$AI_EXISTS" -eq 1 ] && echo "⏭️ AI 日报今天已有，跳过" && TYPE="skip" ;;
            us_market)  [ "$US_EXISTS" -eq 1 ] && echo "⏭️ 美股简报今天已有，跳过" && TYPE="skip" ;;
            global)     [ "$GLOBAL_EXISTS" -eq 1 ] && echo "⏭️ 全球简报今天已有，跳过" && TYPE="skip" ;;
          esac

          echo "type=${TYPE}" >> $GITHUB_OUTPUT
          echo "🎯 本趟任务: ${TYPE}"

      - name: 采集 & DeepSeek炼油 & 存储
        if: steps.slot.outputs.type != 'skip'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_TYPE: ${{ steps.slot.outputs.type }}
        run: python .github/scripts/daily-report.py

      - name: 📱 Bark 推送 (直推 iPhone)
        if: steps.slot.outputs.type != 'skip'
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          case "${{ steps.slot.outputs.type }}" in
            ai)         PREFIX="AI日报";   EMOJI="🤖" ;;
            us_market)  PREFIX="美股简报"; EMOJI="📈" ;;
            global)     PREFIX="全球简报"; EMOJI="🌍" ;;
          esac
          FILE="日报/${PREFIX}-${TODAY}.md"
          HEADLINE=$(grep '^>' "$FILE" | grep -v '📡' | grep -v '⏰' | head -1 | sed 's/^> //' | head -c 200)
          curl -s -o /dev/null -w "%{http_code}" "https://api.day.app/${BARK_KEY}/${EMOJI}%20${PREFIX}/${HEADLINE}?group=%E6%97%A5%E6%8A%A5"
          echo ""
          echo "✅ Bark 已推送: ${EMOJI} ${PREFIX}"

      - name: 💬 飞书消息推送 (直推手机)
        if: steps.slot.outputs.type != 'skip'
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_OPEN_ID: ${{ secrets.FEISHU_OPEN_ID }}
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          case "${{ steps.slot.outputs.type }}" in
            ai)         PREFIX="AI日报";   EMOJI="🤖" ;;
            us_market)  PREFIX="美股简报"; EMOJI="📈" ;;
            global)     PREFIX="全球简报"; EMOJI="🌍" ;;
          esac
          FILE="日报/${PREFIX}-${TODAY}.md"
          HEADLINE=$(grep '^>' "$FILE" | grep -v '📡' | grep -v '⏰' | head -1 | sed 's/^> //' | head -c 200)
          html_url="https://github.com/Daniel421-luo/content-factory/blob/main/${FILE// /%20}"
          python3 - "$EMOJI" "$PREFIX" "$HEADLINE" "$TODAY" "$html_url" << 'PYEOF'
          import json, os, requests, sys
          _, emoji, prefix, headline, today, html_url = sys.argv
          r = requests.post("https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              json={"app_id": os.environ["FEISHU_APP_ID"], "app_secret": os.environ["FEISHU_APP_SECRET"]}, timeout=10)
          token = r.json()["tenant_access_token"]
          msg = f"{emoji} {prefix} | {today}\n{headline}\n\n🔗 {html_url}"
          r = requests.post("https://open.feishu.cn/open-apis/im/v1/messages",
              params={"receive_id_type": "open_id"},
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={"receive_id": os.environ["FEISHU_OPEN_ID"], "msg_type": "text",
                    "content": json.dumps({"text": msg})}, timeout=10)
          data = r.json()
          print("✅ 飞书已推送" if data.get("code") == 0 else f"❌ 飞书失败: {data}")
          PYEOF

      - name: Git 提交
        if: steps.slot.outputs.type != 'skip'
        run: |
          git config user.name "AI日报机器人"
          git config user.email "bot@content-factory.local"
          mkdir -p 日报/
          git add -A 日报/
          git commit -m "🤖 自动日报 $(TZ='Asia/Shanghai' date +%Y-%m-%d) [${{ steps.slot.outputs.type }}]" || echo "⏭️ Nothing to commit"
          git pull --rebase origin main --no-edit
          git push

      - name: 汇总状态
        if: always()
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          echo "📊 今日报告状态 ($TODAY):"
          [ -f "日报/AI日报-${TODAY}.md" ]     && echo "  ✅ AI 日报"     || echo "  ❌ AI 日报 缺失"
          [ -f "日报/美股简报-${TODAY}.md" ]   && echo "  ✅ 美股简报"    || echo "  ❌ 美股简报 缺失"
          [ -f "日报/全球简报-${TODAY}.md" ]  && echo "  ✅ 全球简报"    || echo "  ❌ 全球简报 缺失"
