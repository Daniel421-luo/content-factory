name: 🎬 抖音链接处理

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      url:
        description: '抖音视频链接'
        required: true
  issues:
    types: [opened]

jobs:
  process-douyin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 采集 & DeepSeek提炼 & 分类 & 存储
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUYIN_URL: ${{ github.event.inputs.url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/douyin-process.py

      - name: Git 提交
        run: |
          git config user.name "抖音提炼机器人"
          git config user.email "bot@content-factory.local"
          git add 抖音素材库/
          git diff --staged --quiet || git commit -m "🎬 抖音提炼 $(TZ='Asia/Shanghai' date +%Y-%m-%d_%H%M)"
          git push
